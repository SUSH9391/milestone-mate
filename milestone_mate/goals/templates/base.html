<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Milestone Mate{% endblock %}</title>

  <!-- Google Fonts: Poppins (base) + Inter (navbar) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --font-main: 'Poppins', sans-serif;
      --bg: #FAFAF9;
      --text-primary: #1a1a1a;
      --text-muted: #6b7280;
      --hover-bg: #F7F6F3;
      --active-bg: #F1F0EF;
      --border: #e5e5e5;
      --accent: #2563eb;
      --shadow: rgba(0, 0, 0, 0.04);
    }

    * { box-sizing: border-box; }

    body {
      font-family: var(--font-main);
      background: var(--bg);
      color: var(--text-primary);
      margin: 0;
    }

    header {
      padding: 16px 0;
      border-bottom: 1px solid #eee;
      background: #fff;
    }

    nav a {
      margin-right: 12px;
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 700;
      padding: 8px 10px;
      border-radius: 10px;
    }

    nav a:hover {
      background: var(--hover-bg);
    }

    main { min-height: 70vh; }

    .page-wrapper { padding: 5rem 2.5rem; }

    /* Shared Notion-inspired utility classes */
    .notion-row {
      display: grid;
      grid-template-columns: 32px 1.2fr 2fr 110px 120px;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 140ms ease;
    }

    .notion-row:last-child { border-bottom: none; }
    .notion-row:hover { background: var(--hover-bg); }

    .goal-title {
      font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .goal-description {
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: .35rem .65rem;
      border-radius: 9999px;
      font-weight: 700;
      font-size: 12px;
      margin-left: .75rem;
    }

    .badge-completed { background: #dcfce7; color: #166534; }
    .badge-inprogress { background: #e5e7eb; color: #374151; }
    .badge-daily { background: #DBEAFE; color: #1D4ED8; }
    .badge-longterm { background: #D1FAE5; color: #065F46; }

    .filter-tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
    }
    .filter-tabs .tab {
        padding: 6px 16px;
        border-radius: 6px;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-muted);
        text-decoration: none;
        transition: background 0.15s;
    }
    .filter-tabs .tab.active,
    .filter-tabs .tab:hover {
        background: var(--active-bg);
        color: var(--text-primary);
    }

    .btn-back {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      font-weight: 700;
      color: var(--text-primary);
    }

    .btn-back:hover { background: var(--hover-bg); }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 14px 0 0 0;
      font-family: var(--font-main);
    }

    .pagination a,
    .pagination span {
      border: 1px solid var(--border);
      padding: 7px 10px;
      border-radius: 10px;
      background: #fff;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
    }

    .pagination span.active { background: var(--active-bg); }

    /* Detail page styling */
    .detail-header { margin-bottom: 1rem; }
    .goal-detail-title {
      font-size: 36px;
      margin: .75rem 0 0;
      letter-spacing: -0.02em;
      font-weight: 800;
    }

    .goal-detail-date {
      margin: 1rem 0;
      color: var(--text-muted);
      font-weight: 600;
    }

    .goal-detail-description {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
      color: var(--text-primary);
    }

    .goal-detail-attachment { margin-top: 16px; }
    .attachment-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fff;
      text-decoration: none;
      font-weight: 700;
      color: var(--text-primary);
    }

    .attachment-link:hover { background: var(--hover-bg); }

    /* Keep legacy gm-* selectors from list page while we migrate */
    .gm-page { background: var(--bg); padding: 5rem 2.5rem; }
    .gm-title { font-family: var(--font-main); font-weight: 800; font-size: 30px; margin: 0 0 1.25rem 0; letter-spacing: -0.02em; color: var(--text-primary); }
    .gm-grid { width: 100%; max-width: 980px; margin: 0 auto; }

    .gm-tabs { display: flex; gap: .5rem; align-items: center; margin-bottom: 1.25rem; }
    .gm-tab {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text-primary);
      border-radius: 9999px;
      padding: .45rem .75rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      gap: .5rem;
      align-items: center;
      font-family: var(--font-main);
    }
    .gm-tab[aria-selected="true"] { background: var(--active-bg); }

    .gm-monthWrap { margin-left: .25rem; display: none; }
    .gm-tabs[data-active="month"] .gm-monthWrap { display: inline-flex; align-items: center; gap: .5rem; }
    .gm-monthInput {
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: .35rem .7rem;
      font-family: var(--font-main);
      background: #fff;
    }

    .gm-list { border: 1px solid var(--border); border-radius: 14px; overflow: hidden; background: #fff; box-shadow: 0 1px 0 var(--shadow); }

    .gm-row {
      display: grid;
      grid-template-columns: 32px 1.2fr 2fr 110px 120px;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 140ms ease, opacity 140ms ease;
    }
    .gm-row:last-child { border-bottom: none; }
    .gm-row:hover { background: var(--hover-bg); }

    .gm-row.dim { opacity: 0.6; }
.gm-check-input {

    appearance: none;

    width: 24px;
    height: 24px;

    border: 2px solid #9ca3af;

    border-radius: 7px;

    background: white;

    cursor: pointer;

    display: inline-block;

    position: relative;

    transition: all 0.2s ease;
}

.gm-check-input:hover {
    border-color: #111827;
}

.gm-check-input:checked {

    background: #111827;

    border-color: #111827;
}

.gm-check-input:checked::after {

    content: "✓";

    position: absolute;

    color: white;

    font-size: 15px;

    left: 5px;
    top: 0px;
}
    .gm-row[data-completed='true'] .gm-titleCell {

    text-decoration: line-through;

    opacity: 0.55;
}

.gm-row[data-completed='true'] {

    opacity: 0.7;
}
    .gm-titleCell { font-weight: 700; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .gm-descCell { color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--font-main); }

    .gm-attachBtn {
      justify-self: end;
      width: 44px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: background 120ms ease, opacity 120ms ease;
    }

    .gm-subgoals {

    margin-left: 48px;

    margin-top: 10px;

    display: flex;
    flex-direction: column;
    gap: 8px;
}

.gm-subgoalRow {

    display: flex;
    align-items: center;

    gap: 10px;

    padding: 6px 0;

    color: #6b7280;

    font-size: 14px;
}

.gm-subgoalArrow {
    opacity: 0.5;
}

.gm-emptySubgoal {

    margin-left: 24px;

    font-size: 13px;

    color: #9ca3af;
}
.gm-subgoalForm {

    margin-left: 48px;

    margin-top: 10px;

    display: flex;
    gap: 8px;
}

.gm-subgoalInput {

    border: 1px solid #e5e7eb;

    border-radius: 8px;

    padding: 6px 10px;

    width: 220px;
}

.gm-subgoalBtn {

    border: none;

    background: #111827;

    color: white;

    border-radius: 8px;

    padding: 6px 12px;

    cursor: pointer;
}
.gm-subgoalRow.completed span {

    text-decoration: line-through;

    opacity: 0.5;
}
.g-row {
    padding: 24px;
}
.gm-subgoalCheck {

    width: 18px;
    height: 18px;

    cursor: pointer;

    accent-color: #111827;
}
.gm-subgoalInput:disabled,
.gm-subgoalBtn:disabled {

    opacity: 0.5;

    cursor: not-allowed;
}

    .gm-attachBtn:hover { background: var(--hover-bg); }
    .gm-attachBtn.dimmed { opacity: 0.35; cursor: default; }

    .gm-dateCell { font-size: 12px; color: var(--text-muted); text-align: right; white-space: nowrap; font-family: var(--font-main); }

    .gm-addRow { display: flex; gap: 10px; align-items: center; padding: 14px 16px; background: #fff; border-top: 1px solid var(--border); }
    .gm-addBtn { font-weight: 600; color: #2b2b2b; cursor: pointer; font-family: var(--font-main); }
    .gm-addBtn span { color: #6b7280; font-weight: 600; }

    .gm-inlineForm { padding: 14px 16px; background: #fff; border-top: 1px solid var(--border); display: none; }
    .gm-inlineForm.show { display: block; }

    .gm-formGrid { display: grid; grid-template-columns: 1fr; gap: 10px; max-width: 760px; }

    .gm-label { font-size: 13px; color: var(--text-muted); font-weight: 600; margin-bottom: 4px; font-family: var(--font-main); }

    .gm-input, .gm-textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font-family: var(--font-main);
    }

    .gm-textarea { min-height: 90px; resize: vertical; }

    .gm-actions { display: flex; gap: 10px; align-items: center; margin-top: 6px; }

    .gm-primary { background: var(--text-primary); color: #fff; border: 1px solid var(--text-primary); padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 700; font-family: var(--font-main); }
    .gm-cancel { background: transparent; border: 1px solid var(--border); padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 600; font-family: var(--font-main); }

    .gm-pagination { display: flex; justify-content: center; gap: 6px; padding: 14px 0 0 0; font-family: var(--font-main); }
    .gm-pageLink { border: 1px solid var(--border); padding: 7px 10px; border-radius: 10px; background: #fff; font-weight: 600; color: var(--text-primary); text-decoration: none; }
    .gm-pageLink.active { background: var(--active-bg); }

    .gm-tooltip {
      position: fixed;
      z-index: 9999;
      background: rgba(26, 26, 26, 0.92);
      color: #fff;
      padding: 10px 12px;
      border-radius: 12px;
      font-family: var(--font-main);
      font-size: 13px;
      max-width: 320px;
      display: none;
    }

  </style>
</head>
<body>
  <header>
    <nav class="app-nav">
      <div class="app-nav-left">
        <a class="app-logo" href="{% url 'home' %}">
          Milestone Mate
        </a>
      </div>

      <div class="app-nav-right">
        <a class="app-nav-link" href="{% url 'home' %}">Home</a>
        <a class="app-nav-link" href="{% url 'list_goals' %}">Goal</a>

        <div class="app-dropdown" data-open="false">
          <button class="app-avatar" type="button" aria-haspopup="menu" aria-expanded="false">
            <span class="app-avatar-inner">🙂</span>
          </button>
          <div class="app-dropdown-menu" role="menu">
            <a class="app-dropdown-item" href="#" role="menuitem">Rewards</a>
            <a class="app-dropdown-item" href="#" role="menuitem">Subscription</a>
            <a class="app-dropdown-item app-dropdown-logout" href="#" role="menuitem">Logout</a>
          </div>
        </div>

        <script>
          (function () {
            const dropdown = document.currentScript.previousElementSibling;
            const trigger = dropdown.querySelector('.app-avatar');
            const menu = dropdown.querySelector('.app-dropdown-menu');

            function setOpen(isOpen) {
              dropdown.dataset.open = String(isOpen);
              trigger.setAttribute('aria-expanded', String(isOpen));
            }

            trigger.addEventListener('click', (e) => {
              e.stopPropagation();
              const isOpen = dropdown.dataset.open === 'true';
              setOpen(!isOpen);
            });

            document.addEventListener('click', () => setOpen(false));

            menu.addEventListener('click', (e) => e.stopPropagation());
          })();
        </script>
      </div>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <style>
    .app-nav {
      width: 100%;
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      max-width: 100%;
    }

    .app-nav > .app-nav-left,
    .app-nav > .app-nav-right {
      width: 100%;
      max-width: 1200px;
    }

    .app-nav-left {
      display: flex;
      align-items: center;
    }

    .app-nav-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }



    .app-logo {
      text-decoration: none;
      font-family: "Inter", sans-serif;
      font-weight: 800;
      color: var(--text-primary);
      font-size: 18px;
    }

    .app-nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .app-nav-link {
      text-decoration: none;
      font-family: "Inter", sans-serif;
      color: var(--text-primary);
      font-weight: 700;
      padding: 8px 10px;
      border-radius: 10px;
    }

    .app-nav-link:hover {
      background: var(--hover-bg);
    }

    .app-avatar {
      width: 36px;
      height: 36px;
      border-radius: 9999px;
      background: #f3f4f6;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
    }

    .app-dropdown {
      position: relative;
      display: inline-block;
    }

    .app-dropdown-menu {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 220px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.08);
      padding: 8px;
      display: none;
      z-index: 1000;
    }

    .app-dropdown[data-open="true"] .app-dropdown-menu {
      display: block;
    }

    .app-dropdown-item {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 10px 12px;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text-primary);
      font-family: "Inter", sans-serif;
      font-weight: 600;
      font-size: 14px;
    }

    .app-dropdown-item:hover {
      background: var(--hover-bg);
    }

    .app-dropdown-logout {
      color: #b91c1c;
    }

    .app-avatar-inner {
      transform: translateY(-1px);
      user-select: none;
    }
  </style>
</body>
</html>
