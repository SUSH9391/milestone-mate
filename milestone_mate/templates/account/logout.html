{% extends "base.html" %}

{% block title %}Signed Out{% endblock %}

{% block content %}
  <style>
    .auth-wrap { max-width: 440px; margin: 0 auto; padding: 6rem 1.5rem; }
    .auth-card { background: #fff; border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); padding: 36px 32px; text-align: center; }
    .auth-title { font-size: 28px; font-weight: 800; margin: 0 0 8px; letter-spacing: -0.02em; }
    .auth-subtitle { color: var(--text-muted); font-weight: 500; margin: 0 0 28px; font-size: 15px; line-height: 1.5; }
    .form-actions { margin-top: 28px; display: flex; flex-direction: column; gap: 12px; }
    .gm-primary { width: 100%; display: inline-block; box-sizing: border-box; background: var(--text-primary); color: #fff; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 700; font-family: var(--font-main); font-size: 15px; transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(26,26,26,0.15); text-decoration: none; }
    .gm-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(26,26,26,0.2); }
  </style>

  <div class="auth-wrap">
    <div class="auth-card">
      <h1 class="auth-title">Signed out</h1>
      <p class="auth-subtitle">You have been successfully logged out.</p>

      <div class="form-actions">
        <a class="gm-primary" href="{% url 'account_login' %}">Sign in again</a>
      </div>
    </div>
  </div>
{% endblock %}
